[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_BASE_URL = "https://milesbanks.thewarriors.team/api"
  # NOTE: VITE_STRIPE_PUBLISHABLE_KEY should be set in Netlify Site Settings > Environment Variables
  # Do not commit sensitive keys directly to netlify.toml

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
